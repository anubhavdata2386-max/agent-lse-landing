<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent LSE</title>
<meta name="description" content="Agent LSE — the AI assistant for the LSE Class of 2024–26.">
<meta name="theme-color" content="#0a0908">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='10' y='10' width='12' height='12' rx='2' fill='%23D4AF37' transform='rotate(45 16 16)'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<script defer
  src="https://www.gstatic.com/ces-console/fast/ces-messenger/ces-messenger.js">
</script>

<style>
  :root{
    --bg:#0a0908; --surface:#14130f; --surface2:#1c1a14; --border:#2a2720;
    --fg:#f3efe4; --muted:#8f897c; --accent:#D4AF37; --accent-contrast:#1a1407;
    --accent-glow:#D4AF37;
  }
  :root[data-theme="light"]{
    --bg:#f1efe7; --surface:#fbfaf5; --surface2:#f4f2ea; --border:#e4e0d3;
    --fg:#232118; --muted:#6f6a5c; --accent:#8a6d12; --accent-contrast:#fff8e6;
    --accent-glow:rgba(138,109,18,.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh; display:flex; flex-direction:column;
    background:var(--bg); color:var(--fg);
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    transition:background .45s ease, color .45s ease;
  }
  @keyframes lse-rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

  .site-header{
    display:flex; align-items:center; justify-content:space-between;
    width:100%; max-width:1080px; margin:0 auto; padding:22px 30px;
  }
  .logo{display:flex; align-items:center; gap:11px;}
  .logo-mark{
    width:11px; height:11px; background:var(--accent); transform:rotate(45deg);
    border-radius:2px; box-shadow:0 0 14px var(--accent-glow);
  }
  .logo-text{font-family:'Newsreader',serif; font-size:24px; font-weight:600; letter-spacing:.3px; font-optical-sizing:auto;}
  .logo-text .accent{color:var(--accent);}

  .theme-toggle{display:flex; gap:3px; padding:3px; border:1px solid var(--border); border-radius:999px; background:var(--surface2);}
  .theme-btn{
    padding:7px 17px; border:none; border-radius:999px; cursor:pointer;
    font-size:13px; font-family:inherit; font-weight:500; color:var(--muted);
    background:transparent; display:flex; align-items:center; gap:6px;
    transition:all .25s ease;
  }
  :root[data-theme="dark"] .theme-btn[data-set-theme="dark"],
  :root[data-theme="light"] .theme-btn[data-set-theme="light"]{
    background:var(--accent); color:var(--accent-contrast); font-weight:600;
  }

  .hero{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:100%; max-width:820px; margin:0 auto; padding:24px 24px 56px;
  }
  .eyebrow{
    animation:lse-rise .6s ease both;
    font-size:12px; letter-spacing:2.6px; text-transform:uppercase; color:var(--accent);
    font-weight:600; margin-bottom:22px;
  }
  .headline{
    animation:lse-rise .7s ease both .05s;
    font-family:'Newsreader',serif; font-weight:500; font-optical-sizing:auto;
    font-size:clamp(40px,6.4vw,68px); line-height:1.04; text-align:center;
    margin:0 0 14px; text-wrap:balance;
  }
  .headline .accent{font-style:italic; font-weight:600; color:var(--accent);}
  .subtext{
    animation:lse-rise .7s ease both .12s;
    font-size:clamp(17px,2.4vw,22px); color:var(--muted); text-align:center; margin:0 0 40px;
  }

  .chat-card{
    animation:lse-rise .7s ease both .2s;
    width:100%; max-width:380px; padding:26px 28px; border:1px solid var(--border);
    border-radius:20px; background:var(--surface); cursor:pointer; text-align:left;
    font-family:inherit; color:inherit;
    transition:border-color .25s ease, transform .2s ease, box-shadow .25s ease;
  }
  .chat-card:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.25);}
  .chat-card:active{transform:translateY(0);}
  .chat-card-header{display:flex; align-items:center; gap:8px; margin-bottom:20px;}
  .status-dot{
    width:8px; height:8px; border-radius:50%; background:#4caf50; box-shadow:0 0 8px #4caf50;
    animation:lse-pulse 2s ease-in-out infinite;
  }
  .chat-card-title{font-weight:600; font-size:13px;}
  .chat-card-status{margin-left:auto; font-size:12px; color:var(--muted);}
  .chat-card-body{display:flex; align-items:center; gap:16px;}
  .glow-ring{
    position:relative; flex:none; width:40px; height:40px; border-radius:50%;
    border:1px solid var(--accent); display:flex; align-items:center; justify-content:center;
    animation:lse-glow 2.6s ease-in-out infinite;
  }
  .glow-diamond{width:10px; height:10px; background:var(--accent); transform:rotate(45deg); border-radius:2px; box-shadow:0 0 12px var(--accent-glow);}
  .chat-card-heading{margin:0; font-family:'Newsreader',serif; font-size:19px; font-weight:500;}
  .chat-card-helper{margin:4px 0 0; font-size:13px; color:var(--muted);}
  @keyframes lse-pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  @keyframes lse-glow{0%,100%{box-shadow:0 0 0 0 var(--accent-glow);}50%{box-shadow:0 0 14px 2px var(--accent-glow);}}

  .site-footer{padding:22px 30px 32px; text-align:center;}
  .disclaimer{font-size:12.5px; color:var(--muted); margin:0;}
  .credit{font-size:11.5px; color:var(--muted); opacity:.75; margin:8px 0 0;}

  /* ces-messenger does not theme via host-element CSS custom properties — it injects
     its theme-id palette plus the custom-css attribute string directly into its
     shadow DOM, so the dark/gold styling lives on the element's attributes instead. */
  ces-messenger{
    z-index:999;
    /* hidden until the user clicks the hero card */
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  ces-messenger.lse-open{ opacity:1; pointer-events:auto; }

  @media (max-width:600px){
    .site-header{padding:14px 20px;}
    .logo{gap:9px;}
    .logo-mark{width:9px; height:9px; box-shadow:0 0 10px var(--accent-glow);}
    .logo-text{font-size:19px;}
    .theme-btn{padding:5px 11px; font-size:11px;}

    .hero{padding:28px 20px 20px;}
    .eyebrow{font-size:10.5px; letter-spacing:2.2px; margin-bottom:16px;}
    .headline{font-size:32px; line-height:1.06; margin:0 0 11px;}
    .subtext{font-size:16px; margin:0 0 24px;}
    .chat-card{padding:20px 22px; max-width:none;}
    .chat-card-heading{font-size:17px;}
    .chat-card-helper{font-size:12.5px;}

    .site-footer{padding:18px 20px 28px;}
    .disclaimer{font-size:11px;}
    .credit{font-size:10.5px; margin-top:6px;}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    <div class="logo-mark"></div>
    <span class="logo-text">Agent&nbsp;<span class="accent">LSE</span></span>
  </div>
  <div class="theme-toggle" role="group" aria-label="Theme">
    <button type="button" class="theme-btn" data-set-theme="dark" aria-pressed="true">Dark</button>
    <button type="button" class="theme-btn" data-set-theme="light" aria-pressed="false">Light</button>
  </div>
</header>

<main class="hero">
  <div class="eyebrow">Class of 2024 &mdash; 26</div>
  <h1 class="headline">Welcome, I am <span class="accent">Agent&nbsp;LSE</span>.</h1>
  <p class="subtext">How can I help?</p>

  <button type="button" class="chat-card" id="agent-lse-launch" aria-label="Open the Agent LSE chat assistant">
    <div class="chat-card-header">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="chat-card-title">Agent&nbsp;LSE</span>
      <span class="chat-card-status">Online</span>
    </div>
    <div class="chat-card-body">
      <span class="glow-ring" aria-hidden="true"><span class="glow-diamond"></span></span>
      <div>
        <p class="chat-card-heading">Ready when you are.</p>
        <p class="chat-card-helper">Tap to start a conversation.</p>
      </div>
    </div>
  </button>
</main>

<footer class="site-footer">
  <p class="disclaimer">Agent LSE is AI-powered and can make mistakes. Please verify important information.</p>
  <p class="credit">Conceptualised by Anubhav Khanna</p>
</footer>

<script>
(function () {
  var root = document.documentElement;
  var themeColors = { dark: '#0a0908', light: '#f1efe7' };
  var metaTheme = document.querySelector('meta[name="theme-color"]');

  function setTheme(theme) {
    root.setAttribute('data-theme', theme);
    if (metaTheme) metaTheme.setAttribute('content', themeColors[theme]);
    document.querySelectorAll('[data-set-theme]').forEach(function (btn) {
      btn.setAttribute('aria-pressed', String(btn.getAttribute('data-set-theme') === theme));
    });
  }

  document.querySelectorAll('[data-set-theme]').forEach(function (btn) {
    btn.addEventListener('click', function () { setTheme(btn.getAttribute('data-set-theme')); });
  });
})();
</script>

<ces-messenger
  deployment-id="projects/59072056498/locations/us/apps/40e86b20-552e-46b7-bee1-0c4d6fee5400/deployments/0de03917-a2f9-48d5-9082-a2ceeb991b71"
  token-broker-url="https://ces-token-broker-6x63hxbz4q-uc.a.run.app"
  chat-title="Agent LSE"
  theme-id="dark"
  custom-css="
    :host { --brand-color: #D4AF37; --text-color: #f3efe4; }
    main { background: #14130f !important; }
    header { background: #1c1a14 !important; color: #f3efe4 !important; }
    header h1 { color: #D4AF37 !important; }
    button:not(.send) { background: #D4AF37 !important; color: #1a1407 !important; }
  "
></ces-messenger>

<script>
  (function () {
    var launchBtn = document.getElementById('agent-lse-launch');
    if (!launchBtn) return;

    launchBtn.addEventListener('click', function () {
      var cm = document.querySelector('ces-messenger');
      if (!cm) return;
      cm.classList.add('lse-open');
      if (typeof cm.open === 'function') cm.open();
    });
  })();
</script>

</body>
</html>
